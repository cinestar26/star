<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JW Player - HLS Stream Player (M3U8)</title>
    
    <!-- JW Player 8 SDK (latest stable from CDN) -->
    <!-- Includes HLS.js polyfill for cross-browser HLS streaming -->
    <script src="https://cdn.jwplayer.com/libraries/6H9pNy3b.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 24px;
        }
        
        .player-card {
            max-width: 1280px;
            width: 100%;
            background: #000000;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }
        
        .jw-container {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        
        /* The JW Player element fills container */
        #jwplayer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info-footer {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
        }
        
        .badge {
            background: #dc2626;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .tech-details {
            display: flex;
            gap: 20px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            opacity: 0.75;
        }
        
        .warning-note {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: #94a3b8;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .warning-note i {
            font-style: normal;
            font-size: 1rem;
        }
        
        @media (max-width: 700px) {
            body {
                padding: 12px;
            }
            .info-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="jw-container">
        <!-- JW Player will be injected inside this div -->
        <div id="jwplayer-container"></div>
    </div>
    <div class="info-footer">
        <div class="badge">🔴 HLS STREAM · M3U8</div>
        <div class="tech-details">
            <span>🎥 JW Player 8</span>
            <span>⚡ Adaptive Bitrate</span>
            <span>📡 Quality selector</span>
        </div>
        <div class="warning-note">
            <i>⚠️</i> Requires valid stream token / cookies if access restricted
        </div>
    </div>
</div>

<script>
    (function() {
        // --------------------------------------------------------------
        // 🔥 THE M3U8 URL (Hotstar / IPL 2026 stream example)
        // --------------------------------------------------------------
        const STREAM_URL = "https://vod01.akt.hotstar-cdn.net/videos/cricket/inallow-ipl-2026-1540066073/1540066074/b8fd04046ec040d59e857dfaa40d30d4/index_7.m3u8";
        
        // --------------------------------------------------------------
        // ⚙️ OPTIONAL: If the stream requires specific HTTP headers (e.g., Referer, Origin, Authorization)
        // JW Player supports token-based authentication via 'hlsjsconfig' or custom request headers.
        // Note: Most DRM / token-protected streams (Hotstar) require a valid session cookie.
        // The headers below are examples; you may need to extract actual session from browser.
        // --------------------------------------------------------------
        const CUSTOM_HEADERS = {
            // "Referer": "https://www.hotstar.com/",
            // "Origin": "https://www.hotstar.com",
            // "Authorization": "Bearer YOUR_TOKEN_HERE"
        };
        
        // Helper: If custom headers are needed, we inject them into hls.js config (used by JW Player on non-Safari)
        function getHlsJsConfig() {
            if (Object.keys(CUSTOM_HEADERS).length === 0) {
                return {}; // default config
            }
            // hls.js configuration to attach custom headers on each fragment request
            return {
                xhrSetup: function(xhr, url) {
                    for (const [key, value] of Object.entries(CUSTOM_HEADERS)) {
                        xhr.setRequestHeader(key, value);
                    }
                }
            };
        }
        
        // Wait for DOM and JW Player API to be ready
        document.addEventListener("DOMContentLoaded", function() {
            // Get the container element
            const playerElement = document.getElementById("jwplayer-container");
            if (!playerElement) {
                console.error("JW Player container not found");
                return;
            }
            
            // Setup JW Player configuration
            // For HLS streams, JW Player uses native HLS on Safari + hls.js on other browsers
            const playerConfig = {
                // The div ID or element reference
                container: playerElement,
                // Stream file
                file: STREAM_URL,
                // Tell JW Player it's an HLS stream (explicit type)
                type: "hls",
                // Primary rendering: html5 ensures best HLS support
                primary: "html5",
                // Autostart can be set to false by default; user can click play
                autostart: false,
                // Mute start is not required, but we let user control volume
                mute: false,
                // Show quality selection button if multiple renditions exist in M3U8
                // JW Player automatically detects bitrates and adds quality menu
                // Force quality selection UI to be visible
                allowFullscreen: true,
                // Enable controls
                controls: true,
                // Provide a poster frame (optional, can be removed)
                // image: "https://assets.codepen.io/32795/hotstar-poster-placeholder.jpg",
                // Preload metadata for faster startup
                preload: "auto",
                // To handle potential token expiration or CORS issues, we can set up provider options
                // For HLS, JW Player uses its internal HLS provider; we can forward custom hls.js config
                hlsjsConfig: getHlsJsConfig(),
                // If the stream requires advanced CORS with credentials (cookies), we enable:
                // This helps to send cookies along with segment requests.
                // Important: Hotstar tokens usually rely on cookies. This must be allowed by CORS.
                withCredentials: true,   // Sends cookies & authorization headers cross-origin if CORS allows
                
                // Optionally configure the quality label behavior
                // JW Player automatically lists renditions in settings gear.
                // Enable "auto" quality option.
                qualityLabels: {
                    auto: "Auto (Adaptive)",
                    low: "Low",
                    medium: "Medium",
                    high: "High"
                },
                
                // To handle errors gracefully (like 403 Forbidden)
                // Show custom error message if stream can't load.
                // Note: JW Player will display generic error; we can capture and enhance.
            };
            
            // Initialize JW Player instance
            let jwplayerInstance = jwplayer("jwplayer-container").setup(playerConfig);
            
            // Event listeners for debugging / user feedback
            jwplayerInstance.on("ready", function() {
                console.log("✅ JW Player is ready, attempting to load HLS stream.");
                // Attempt to play? Usually user clicks play. But we can check autostart false.
            });
            
            jwplayerInstance.on("error", function(error) {
                console.error("❌ JW Player error:", error);
                // Provide more descriptive feedback based on error code
                let errorMessage = "Unable to play the stream. ";
                if (error.message) errorMessage += error.message;
                if (error.code === 100011) { // HLS load error
                    errorMessage = "Failed to load M3U8 manifest. The stream may require authentication, a valid session, or geographic permissions. (403 / token missing)";
                } else if (error.code === 100002 || error.code === 100003) {
                    errorMessage = "Network error or CORS block. The server might be rejecting cross-origin requests. Check if custom headers or cookies are needed.";
                } else if (error.code === 100005) {
                    errorMessage = "HLS parsing error – the stream URL might be expired or malformed.";
                }
                // Show a friendly overlay message in the player (optional)
                // jwplayerInstance.addButton? not needed. Just log + we can display on container
                const errorDiv = document.createElement("div");
                errorDiv.style.position = "absolute";
                errorDiv.style.bottom = "60px";
                errorDiv.style.left = "20px";
                errorDiv.style.right = "20px";
                errorDiv.style.backgroundColor = "rgba(0,0,0,0.75)";
                errorDiv.style.color = "#ffb3b3";
                errorDiv.style.padding = "12px 18px";
                errorDiv.style.borderRadius = "12px";
                errorDiv.style.fontSize = "13px";
                errorDiv.style.fontFamily = "monospace";
                errorDiv.style.zIndex = "100";
                errorDiv.style.backdropFilter = "blur(8px)";
                errorDiv.style.borderLeft = "3px solid #ff4d4d";
                errorDiv.innerText = `⚠️ ${errorMessage} \n\nPossible reasons:\n• Expired/token-protected link\n• Missing Hotstar authentication\n• Geo-restriction\n\nTry playing through official Hotstar app.`;
                const container = document.querySelector(".jw-container");
                if (container && !container.querySelector(".custom-error-overlay")) {
                    errorDiv.classList.add("custom-error-overlay");
                    container.style.position = "relative";
                    container.appendChild(errorDiv);
                    setTimeout(() => {
                        if (errorDiv.parentNode) errorDiv.style.opacity = "0.8";
                    }, 100);
                }
            });
            
            jwplayerInstance.on("levelsChanged", function(event) {
                console.log("🎚️ Available quality levels (renditions):", event.levels);
                // JW Player automatically adds gear icon -> quality menu
                if (event.levels && event.levels.length > 0) {
                    const qualityCount = event.levels.length;
                    console.log(`📊 Detected ${qualityCount} quality levels. User can change via settings.`);
                }
            });
            
            jwplayerInstance.on("levelChanged", function(event) {
                if (event.currentLevel) {
                    const height = event.currentLevel.height;
                    console.log(`🔄 Switched to quality: ${height ? height + 'p' : 'adaptive'}`);
                }
            });
            
            jwplayerInstance.on("setupError", function(err) {
                console.warn("JW Player setup error:", err);
            });
            
            // Additional helper: Because Hotstar links often return 403 due to missing Referer / Origin
            // Note: JW Player's hlsjsConfig with custom xhrSetup works only on browsers where hls.js is used (non-Safari)
            // For Safari native HLS, we cannot inject headers easily. Provide notice to user.
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            if (isSafari) {
                console.warn("Safari uses native HLS, custom headers via hls.js are NOT applied. If stream requires specific headers, playback may fail.");
                // Optionally display subtle reminder in footer
                const footerNote = document.querySelector(".warning-note");
                if (footerNote) {
                    footerNote.innerHTML = "<i>🍎</i> Safari: native HLS – some auth headers may be omitted. If 403 persists, use Chrome/Edge with proper cookies.";
                }
            } else {
                console.log("Using hls.js via JW Player – custom headers (if any) will be applied to fragment requests.");
            }
            
            // Handle visibility / cleanup on page unload (optional)
            window.addEventListener("beforeunload", function() {
                if (jwplayerInstance && typeof jwplayerInstance.remove === "function") {
                    jwplayerInstance.remove();
                }
            });
            
            // Expose instance for debugging (optional)
            window.jwPlayerDebug = jwplayerInstance;
        });
    })();
</script>

<!-- 
    Additional note: 
    The provided M3U8 URL is from Hotstar CDN and almost certainly requires:
    1. A valid 'session token' or 'jwt' cookie tied to an active Hotstar subscription.
    2. The 'Referer' header set to 'https://www.hotstar.com'.
    3. The correct 'Origin' and possibly 'x-api-key' headers.
    
    To make this work with JW Player:
    - You must be logged into Hotstar in the same browser (shared cookies).
    - The domain serving this HTML must have access to those cookies (same domain or properly configured CORS).
    - The stream token in the URL might expire after a few minutes.
    
    For production use, you should extract a fresh M3U8 URL from Hotstar's API while authenticated.
    
    JW Player with custom headers example:
    Uncomment CUSTOM_HEADERS object above and set your token / referrer.
    Example:
        const CUSTOM_HEADERS = {
            "Referer": "https://www.hotstar.com/",
            "Origin": "https://www.hotstar.com"
        };
    
    Additionally, you can enable 'withCredentials: true' as set above to pass cookies.
    If the server requires an Authorization Bearer token, add it to CUSTOM_HEADERS.
-->
</body>
</html>
