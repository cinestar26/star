<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports // CineArena</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>

  window.dataLayer = window.dataLayer || [];

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.custom-watermark{
position:absolute;
z-index:40;
pointer-events:none;
top:65%;
left:6%;
transform:translateY(-50%);
font-size:11px;
font-weight:600;
color:rgba(255,255,255,0.12);
}

/* --- Updated Modern Blocker Styles --- */
.block-overlay{
position:fixed;
inset:0;
z-index:99999;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
text-align:center;
}

.block-box{
padding:40px;
max-width:500px;
width:90%;
background:rgba(20, 20, 20, 0.95);
border-radius:16px;
border:1px solid rgba(255, 255, 255, 0.1);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

.block-title{
font-size:42px;
font-weight:800;
color:#ffffff;
text-transform:uppercase;
letter-spacing:2px;
margin-bottom:20px;
text-shadow:0 0 10px rgba(255, 0, 0, 0.3);
}

.block-sub{
font-size:14px;
font-weight:500;
color:rgba(255, 255, 255, 0.6);
line-height:1.6;
}

.block-icon{ display: none; }
.block-note{ display: none; }

@media(max-width:700px){
.custom-watermark{font-size:9px;top:60%;left:16%}
.block-title{font-size:28px}
.block-box{padding:25px}
.block-sub{font-size:12px}
}
</style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline preload="metadata"></video>
<div class="custom-watermark"></div>
</div>

<script>
(function(){
  
  function isSandboxedEnv(){
    try {
      if (window.self === window.top) return false;
      if (window.frameElement && window.frameElement.hasAttribute("sandbox")) {
        return true;
      }
      try {
        document.domain = document.domain;
        if (window.frameElement && !window.frameElement.getAttribute("sandbox")) {
             return false;
        }
      } catch (e) {
         return true;
      }
      return false;
    } catch(e) {
      return true;
    }
  }
  
  function triggerBlockScreen(title, message){
    const container = document.getElementById("player-container");
    const video = document.getElementById("video");
    
    try {
      video.pause();
      video.removeAttribute('src');
      video.load();
    } catch(e){}

    const overlay = document.createElement("div");
    overlay.className = "block-overlay";
    overlay.id = "sandbox-block-display";
    overlay.innerHTML = `
      <div class="block-box">
        <div class="block-title">${title}</div>
        <div class="block-sub">${message}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    if(container) container.style.display = 'none';
  }
  
  if(isSandboxedEnv()){
    triggerBlockScreen('Disable Sandbox', 'Opening Chrome Browser Only & Disable Ad blocker');
    return;
  }
  
  // --- DIRECT COOKIE PROVIDED (HARDCODED) ---
  // Using the exact cookie string from the user request to avoid any fetch errors
  const DIRECT_COOKIE = "__hdnea__=st=1775665043~exp=1775686643~acl=/*~hmac=a5bcb05f8c700dac65443e83c24b4a2f37db6d51ee42a738ec221519b4fc01fa";
  
  const CONFIG={
    streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Telugu_HD_BTS/output/index.mpd",
    keyId: "49e84b9edfd85379b90c81b7d2d3d2bf",
    key: "19c82d3ff094fa06af95820a1572ecb5",
    // No cookieUrl needed anymore, using direct cookie
  };

  document.addEventListener("DOMContentLoaded", async () => {
    // Check if Shaka is available
    if (typeof shaka === 'undefined') {
      console.error("Shaka Player not loaded");
      return;
    }
    
    try {
      shaka.polyfill.installAll();
    } catch(e) { console.warn("Polyfill install issue", e); }
    
    if(!shaka.Player.isBrowserSupported()) {
      console.warn("Browser not supported");
      return;
    }

    const video = document.getElementById("video");
    const container = document.getElementById("player-container");
    
    if(!video || !container) return;
    
    video.muted = true;

    const player = new shaka.Player();
    await player.attach(video);

    // Initialize UI overlay
    const ui = new shaka.ui.Overlay(player, container, video);
    
    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: [
        "mute",
        "play_pause",  
        "time_and_duration",
        "spacer",
        "quality",
        "picture_in_picture",
        "fullscreen"
      ],
      seekBarColors: {
        base: "white",
        buffered: "red", 
        played: "green"
      }
    });

    // Configure DRM with clear keys
    player.configure({
      drm: {
        clearKeys: {
          [CONFIG.keyId]: CONFIG.key
        }
      },
      manifest: {
        defaultPresentationDelay: 5
      },
      streaming: {
        lowLatencyMode: true,
        bufferingGoal: 10,
        rebufferingGoal: 2,
        safeSeekOffset: 5
      }
    });

    // Get networking engine to inject custom headers and cookie
    const netEngine = player.getNetworkingEngine();
    
    // Extract the hdnea value without "__hdnea__=" prefix for URL appending
    let hdneaValue = "";
    if (DIRECT_COOKIE.startsWith("__hdnea__=")) {
      hdneaValue = DIRECT_COOKIE.substring(10); // Remove "__hdnea__=" prefix
    } else {
      hdneaValue = DIRECT_COOKIE;
    }
    
    // Register request filter to add headers and inject __hdnea__ parameter
    netEngine.registerRequestFilter((type, request) => {
      // Always set essential headers for JioTV streaming
      request.headers["Referer"] = "https://www.jiotv.com/";
      request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
      request.headers["Cookie"] = DIRECT_COOKIE;
      request.headers["Origin"] = "https://www.jiotv.com";
      
      // For manifest and segment requests, append __hdnea__ query parameter if not already present
      if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
           type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
          request.uris && request.uris.length > 0) {
        
        const uri = request.uris[0];
        // Avoid double injection
        if (!uri.includes("__hdnea__")) {
          const separator = uri.includes("?") ? "&" : "?";
          request.uris[0] = uri + separator + "__hdnea__=" + encodeURIComponent(hdneaValue);
        }
      }
    });
    
    // Optional: Add response filter for debugging (silent)
    netEngine.registerResponseFilter((type, response) => {
      // Just to ensure no CORS or cookie issues, we don't modify but keep pass-through
      // This helps maintain compatibility
    });
    
    // Function to load stream with retry mechanism
    let retryCount = 0;
    const MAX_RETRIES = 2;
    
    async function loadStream() {
      try {
        await player.load(CONFIG.streamUrl);
        // Attempt to unmute after user interaction or autoplay policies
        video.play().catch(e => {
          console.warn("Autoplay prevented:", e);
          // Show subtle hint for user to click if needed? Not needed because muted autoplay works
        });
        
        // Once stream is loaded, allow unmuting after any user interaction or once playing
        video.addEventListener("play", () => {
          // Unmute only if user might expect sound, but we start muted, let user unmute via UI
          // Shaka UI provides mute button, so we don't auto-unmute to respect browser policies
        });
        
        retryCount = 0; // reset on success
      } catch (error) {
        console.error("Error loading stream:", error);
        if (retryCount < MAX_RETRIES) {
          retryCount++;
          console.log(`Retrying stream load (${retryCount}/${MAX_RETRIES})...`);
          setTimeout(loadStream, 1500);
        } else {
          // Show user friendly error within container
          const overlay = document.createElement("div");
          overlay.style.position = "fixed";
          overlay.style.bottom = "20px";
          overlay.style.left = "20px";
          overlay.style.right = "20px";
          overlay.style.backgroundColor = "rgba(0,0,0,0.8)";
          overlay.style.color = "#ff4444";
          overlay.style.padding = "12px 20px";
          overlay.style.borderRadius = "8px";
          overlay.style.fontSize = "14px";
          overlay.style.textAlign = "center";
          overlay.style.zIndex = "10000";
          overlay.style.fontFamily = "monospace";
          overlay.innerHTML = "⚠️ Stream connection failed. Please refresh the page or check your network. ⚠️";
          document.body.appendChild(overlay);
          setTimeout(() => overlay.remove(), 5000);
        }
      }
    }
    
    // Also listen for player error events for better UX
    player.addEventListener('error', (event) => {
      console.error("Shaka player error:", event.detail);
      const errorMsg = event.detail;
      // If it's a license or manifest error related to auth, we could retry once
      if (errorMsg && (errorMsg.code === 6012 || errorMsg.code === 1002 || errorMsg.code === 6001)) {
        if (retryCount < MAX_RETRIES) {
          retryCount++;
          console.log("Auth or manifest error, reloading stream...");
          setTimeout(() => {
            player.unload().then(() => loadStream()).catch(e=>console.warn);
          }, 2000);
        }
      }
    });
    
    // Start loading the stream with our direct cookie
    await loadStream();
    
    // Additional: Keep-alive / prevent sleep (optional but good for streaming)
    let keepAliveInterval = null;
    if (navigator.wakeLock) {
      let wakeLock = null;
      const requestWakeLock = async () => {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log("Wake Lock active");
        } catch(err) { console.warn("Wake Lock not supported:", err); }
      };
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && wakeLock === null) {
          requestWakeLock();
        } else if (document.visibilityState === 'hidden' && wakeLock) {
          wakeLock.release().then(() => wakeLock = null);
        }
      });
      requestWakeLock();
    }
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (player) player.destroy();
    });
  });
})();
</script>
</body>
</html>
