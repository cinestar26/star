<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPTV Channel Player - DASH Stream Processor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        /* Controls */
        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Video Player */
        .player-container {
            background: black;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        video {
            width: 100%;
            height: auto;
            max-height: 500px;
            background: black;
        }

        .no-channel {
            text-align: center;
            padding: 60px;
            color: white;
            background: rgba(0,0,0,0.7);
        }

        /* Channel Grid */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .channel-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .channel-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .channel-group {
            font-size: 11px;
            color: #888;
        }

        .channel-card.active .channel-group {
            color: rgba(255,255,255,0.8);
        }

        /* Status */
        .status {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .status-entry {
            padding: 5px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .status-entry.error {
            color: #e74c3c;
        }

        .status-entry.success {
            color: #27ae60;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 IPTV DASH Stream Processor</h1>
            <div class="subtitle">Load and play DRM-protected DASH streams with automatic key injection</div>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="inputUrl" placeholder="Stream JSON URL" value="https://example.com/stream.json">
                <input type="text" id="dashProxy" placeholder="DASH Proxy URL" value="https://your-proxy.com/play?mpd=">
                <button onclick="loadChannels()">🚀 Load Channels</button>
            </div>
            <div style="font-size: 12px; color: #666;">
                💡 Tip: The JSON should contain channels with fields: url, kid, key, group_title, tvg_logo, channel_name
            </div>
        </div>

        <div class="player-container" id="playerContainer">
            <video id="videoPlayer" controls></video>
        </div>

        <div class="channel-grid" id="channelGrid">
            <div class="loading">
                <div class="spinner"></div>
                <div>Enter URL and click "Load Channels" to start</div>
            </div>
        </div>

        <div class="status" id="status">
            <div class="status-entry">💡 Ready to load channels...</div>
        </div>
    </div>

    <!-- Include DASH.js for playback -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <script>
        let currentChannels = [];
        let player;

        // Initialize DASH player
        function initPlayer() {
            if (player) {
                player.reset();
            }
            const video = document.getElementById('videoPlayer');
            player = dashjs.MediaPlayer().create();
            player.initialize(video, null, true);
            player.updateSettings({
                'streaming': {
                    'abandonLoadTimeout': 10000,
                    'delayPlaybackAfterInit': 2000
                }
            });
            return player;
        }

        // Main processing function
        async function processStreams(INPUT_URL, DASH_PROXY) {
            addStatus(`📥 Fetching remote stream.json from ${https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u}...`, 'info');
            
            try {
                const res = await fetch(INPUT_URL);
                if (!res.ok) {
                    throw new Error(`Failed to fetch JSON: ${res.status}`);
                }
                const raw = await res.json();

                let channels;
                if (Array.isArray(raw)) {
                    channels = Object.entries({ ...raw });
                } else {
                    channels = Object.entries(raw);
                }
                
                addStatus(`🔄 Processing ${channels.length} channels...`, 'info');

                const result = channels
                    .filter(([id, channel]) => {
                        if (!channel.url) {
                            addStatus(`⚠️ Skipping id=${id} — no url field`, 'warn');
                            return false;
                        }
                        return true;
                    })
                    .map(([id, channel]) => {
                        const { kid, key, url, group_title, tvg_logo, channel_name } = channel;

                        const [mpdUrl, queryString] = url.split("?");
                        const hdneaMatch = queryString ? queryString.match(/(hdnea=[^&]+)/) : null;
                        const cookie = hdneaMatch ? hdneaMatch[1] : "";

                        const bpkMatch = mpdUrl.match(/\/bpk-tv\/([^/]+)\//);
                        let rawName = bpkMatch ? bpkMatch[1] : String(id);
                        rawName = rawName.replace("_BTS", "");

                        const displayName = channel_name || rawName.replace(/_/g, " ");

                        let playerUrl = DASH_PROXY + encodeURIComponent(mpdUrl) +
                            `&keyId=${encodeURIComponent(kid)}` +
                            `&key=${encodeURIComponent(key)}`;
                        
                        if (cookie) {
                            playerUrl += `&cookie=${encodeURIComponent(cookie)}`;
                        }

                        addStatus(`✅ ${displayName} (id: ${id}) | kid: ${kid}`, 'success');

                        return {
                            name: displayName,
                            id: id,
                            logo: tvg_logo,
                            group: group_title,
                            link: playerUrl,
                            originalUrl: url,
                            kid: kid
                        };
                    });

                addStatus(`✨ Successfully processed ${result.length} channels!`, 'success');
                return result;

            } catch (error) {
                addStatus(`❌ Error: ${error.message}`, 'error');
                throw error;
            }
        }

        // Display channels in grid
        function displayChannels(channels) {
            const grid = document.getElementById('channelGrid');
            
            if (!channels || channels.length === 0) {
                grid.innerHTML = '<div class="loading"><div>No channels found</div></div>';
                return;
            }

            grid.innerHTML = channels.map((channel, index) => `
                <div class="channel-card" onclick="playChannel(${index})">
                    ${channel.logo ? `<img class="channel-logo" src="${channel.logo}" onerror="this.src='https://via.placeholder.com/50x50?text=No+Logo'">` : 
                                      `<div class="channel-logo" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 20px;">📺</div>`}
                    <div class="channel-info">
                        <div class="channel-name">${escapeHtml(channel.name)}</div>
                        <div class="channel-group">${escapeHtml(channel.group || 'No Group')}</div>
                    </div>
                </div>
            `).join('');
        }

        // Play selected channel
        function playChannel(index) {
            const channel = currentChannels[index];
            if (!channel) return;

            addStatus(`🎬 Playing: ${channel.name}`, 'info');
            
            // Update active state in UI
            document.querySelectorAll('.channel-card').forEach((card, i) => {
                if (i === index) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });

            // Initialize or reset player
            if (!player) {
                initPlayer();
            } else {
                player.attachSource(null);
            }

            // Load the stream
            player.attachSource(channel.link);
            
            // Optional: Add custom headers if needed
            player.setXhrWithCredentialsForType('', true);
            
            // Auto-play attempt
            const video = document.getElementById('videoPlayer');
            video.play().catch(e => {
                addStatus(`⚠️ Auto-play prevented: ${e.message}. Click play button to start.`, 'warn');
            });
        }

        // Helper functions
        function addStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            const entry = document.createElement('div');
            entry.className = `status-entry ${type === 'error' ? 'error' : (type === 'success' ? 'success' : '')}`;
            
            const time = new Date().toLocaleTimeString();
            let icon = 'ℹ️';
            if (type === 'error') icon = '❌';
            if (type === 'success') icon = '✅';
            if (type === 'warn') icon = '⚠️';
            
            entry.textContent = `${time} ${icon} ${message}`;
            statusDiv.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Limit status entries
            while (statusDiv.children.length > 100) {
                statusDiv.removeChild(statusDiv.firstChild);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Main load function
        async function loadChannels() {
            const inputUrl = document.getElementById('inputUrl').value;
            const dashProxy = document.getElementById('dashProxy').value;
            
            if (!inputUrl || !dashProxy) {
                addStatus('Please provide both URL and DASH Proxy', 'error');
                return;
            }

            // Clear previous status
            document.getElementById('status').innerHTML = '';
            addStatus('🚀 Starting channel processing...', 'info');
            
            // Show loading in grid
            document.getElementById('channelGrid').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading channels...</div>
                </div>
            `;

            try {
                // Process the streams
                currentChannels = await processStreams(inputUrl, dashProxy);
                
                // Display in grid
                displayChannels(currentChannels);
                
                addStatus(`📊 Total channels loaded: ${currentChannels.length}`, 'success');
                
                // Auto-play first channel if available
                if (currentChannels.length > 0) {
                    addStatus('🎯 Auto-playing first channel...', 'info');
                    playChannel(0);
                }
                
            } catch (error) {
                addStatus(`Failed to load channels: ${error.message}`, 'error');
                document.getElementById('channelGrid').innerHTML = `
                    <div class="loading">
                        <div>❌ Failed to load channels</div>
                        <div style="font-size: 12px; margin-top: 10px;">${error.message}</div>
                    </div>
                `;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initPlayer();
            addStatus('🎥 Player ready. Enter your stream.json URL and proxy to begin.', 'success');
        });
    </script>
</body>
</html>
